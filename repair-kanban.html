<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小家電維修所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f3f6;
  --surface:#fff;
  --surface2:#f0f1f5;
  --border:#e3e5ee;
  --border2:#c9ccd8;
  --text:#1c1e2e;
  --text2:#575b78;
  --text3:#9a9eb8;
  --accent:#2563eb;
  --accent-bg:#eef3ff;
  --shadow:0 1px 3px rgba(28,35,80,.07),0 1px 8px rgba(28,35,80,.04);
  --shadow-md:0 4px 18px rgba(28,35,80,.11);
  --tab-h:62px;
}
body{
  background:var(--bg);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  color:var(--text);
  min-height:100vh;
  padding-bottom:var(--tab-h);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ══ TOP BAR ══ */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
}
.brand{font-size:16px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-pill{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:var(--text3);
  padding:4px 10px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
}
.sdot{width:6px;height:6px;border-radius:50%;background:#10b981;flex-shrink:0;animation:blink 2s infinite;}
.sdot.syncing{background:#f59e0b;animation:none;}
.sdot.err{background:#ef4444;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tbtn{
  padding:6px 12px;font-size:12px;font-weight:500;border-radius:7px;
  cursor:pointer;font-family:inherit;
  border:1px solid var(--border2);background:var(--surface);color:var(--text2);
  transition:all .15s;
}
.tbtn:active{transform:scale(.96);}

/* ══ PAGES ══ */
.page{display:none;}
.page.active{display:block;}

/* ══ BOTTOM TAB BAR ══ */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  z-index:60;
  box-shadow:0 -2px 12px rgba(28,35,80,.07);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:color .15s;
  color:var(--text3);font-size:11px;font-weight:500;
  border:none;background:none;font-family:inherit;
  padding:6px 0 4px;
}
.tab svg{width:22px;height:22px;transition:all .15s;}
.tab.active{color:var(--accent);}
.tab.active svg{stroke:var(--accent);}
.tab:active{opacity:.7;}

/* ══ REPAIR PAGE ══ */
.repair-header{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.repair-header h1{font-size:20px;font-weight:600;}

/* ── search bar (pill shape, above chips) ── */
.searchbar{
  background:var(--surface);border-bottom:0;
  padding:10px 14px 6px;
}
.sbox{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;
  padding:9px 16px;width:100%;
}
.sbox svg{width:14px;height:14px;color:var(--text3);flex-shrink:0;}
.sbox input{background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:inherit;flex:1;}
.sbox input::placeholder{color:var(--text3);}

/* ── chip filter: two-row wrap ── */
.fbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 14px 10px;
  display:flex;flex-wrap:wrap;gap:6px;
}
.chip{
  padding:5px 13px;font-size:12px;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0;
}
.chip.on{color:#fff;border-color:transparent;}
.chip:hover:not(.on){background:var(--surface2);}

.board-wrap{overflow-x:auto;padding:14px 14px 24px;}
.board-wrap::-webkit-scrollbar{height:5px;}
.board-wrap::-webkit-scrollbar-track{background:var(--border);border-radius:10px;}
.board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;}

.col{width:220px;flex-shrink:0;display:flex;flex-direction:column;}
.col-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-radius:10px 10px 0 0;
}
.cname{font-size:13px;font-weight:700;}
.ccnt{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.28);}
.col-body{border-radius:0 0 11px 11px;padding:9px 7px 11px;flex:1;min-height:70px;display:flex;flex-direction:column;gap:7px;}

.kcard{
  background:var(--surface);border:1px solid rgba(0,0,0,.06);
  border-radius:10px;padding:11px 12px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  transition:box-shadow .15s,transform .12s;
}
.kcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.11);transform:translateY(-2px);}
.kcard:active{transform:scale(.97);}
.kcard-inner{display:flex;align-items:center;gap:10px;}
.knum-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  font-family:'DM Mono',monospace;
}
.kcard-info{flex:1;min-width:0;}
.k-product{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.k-name{font-size:12px;color:var(--text2);}
.empty-col{border:1.5px dashed rgba(0,0,0,.13);border-radius:9px;padding:18px 10px;text-align:center;font-size:12px;color:var(--text3);}

/* ══ MODAL ══ */
.moverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(20,25,60,.45);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fdi .18s ease;
}
@media(min-width:560px){.moverlay{align-items:center;padding:20px;}}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  animation:slu .22s cubic-bezier(.22,1,.36,1);
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
@media(min-width:560px){.modal{border-radius:16px;max-width:520px;max-height:88vh;}}
@keyframes slu{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.m-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0;}
.m-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.m-head-l{display:flex;align-items:center;gap:11px;}
.m-num{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);}
.m-title{font-size:16px;font-weight:600;line-height:1.3;}
.mclose{
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.m-body{padding:0 0 30px;}

/* modal sections */
.m-hero-strip{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:14px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.m-hero-id{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:2px;line-height:1;}
.m-hero-stage{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;}
.msec{padding:16px 20px 4px;}
.msec-title{
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;
}
.msec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.msec-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.trow{display:grid;grid-template-columns:88px 1fr;align-items:start;gap:6px 10px;padding:7px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}
.trow.edit{grid-template-columns:1fr;gap:4px;}
.tl{font-size:11px;color:var(--text3);font-weight:500;padding-top:2px;line-height:1.4;}
.trow.edit .tl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;}
.tv{font-size:13px;color:var(--text);line-height:1.5;word-break:break-word;}
.tv.bold{font-weight:600;}
.tv.mono{font-family:'DM Mono',monospace;}
.pill{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;}
.pill-y{background:#ecfdf5;color:#065f46;}
.pill-n{background:#f1f5f9;color:#475569;}
.call-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500;}
.acc-wrap{display:flex;flex-wrap:wrap;gap:5px;padding-top:3px;}
.acc-item{font-size:12px;padding:4px 10px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
.acc-item.on{background:var(--accent-bg);border-color:#bfdbfe;color:var(--accent);font-weight:500;}
.note-text{font-size:13px;color:var(--text2);line-height:1.6;}
.msel,.mta,.minput{
  width:100%;padding:9px 11px;font-size:13px;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;transition:border-color .15s;
}
.msel:focus,.mta:focus,.minput:focus{border-color:var(--accent);}
.mta{resize:vertical;min-height:68px;}
.two-inp{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stage-select-wrap{background:var(--surface2);border-top:1px solid var(--border);padding:16px 20px 18px;}
.stage-select-wrap label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:7px;}
.save-btn{
  display:block;width:100%;padding:13px;font-size:14px;font-weight:600;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  cursor:pointer;font-family:inherit;transition:all .15s;margin-top:11px;
}
.save-btn:hover{background:#1d4ed8;}
.save-btn:active{transform:scale(.98);}
.save-btn:disabled{background:#94a3b8;cursor:not-allowed;}

/* ══ INTERVIEW PAGE ══ */
.page-inner{padding:16px;}
.page-header{margin-bottom:18px;}
.page-header h2{font-size:20px;font-weight:600;margin-bottom:4px;}
.page-header p{font-size:13px;color:var(--text2);}
.card-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-box h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.form-inp,.form-ta,.form-sel{
  width:100%;padding:10px 12px;font-size:14px;
  border:1px solid var(--border2);border-radius:9px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;transition:border-color .15s;
}
.form-inp:focus,.form-ta:focus,.form-sel:focus{border-color:var(--accent);}
.form-ta{resize:vertical;min-height:80px;}
.match-list{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.match-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;transition:all .15s;
}
.match-item:hover{border-color:var(--accent);background:var(--accent-bg);}
.match-item.selected{border-color:var(--accent);background:var(--accent-bg);}
.match-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;}
.match-info{flex:1;min-width:0;}
.match-info .mi-name{font-size:13px;font-weight:600;}
.match-info .mi-prod{font-size:12px;color:var(--text2);}
.match-check{font-size:16px;color:var(--accent);flex-shrink:0;}
.submit-btn{
  width:100%;padding:13px;font-size:14px;font-weight:600;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px;
}
.submit-btn:disabled{background:#94a3b8;cursor:not-allowed;}
.submit-btn:active{transform:scale(.98);}
.interview-log{margin-top:14px;}
.ilog-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
  box-shadow:var(--shadow);
}
.ilog-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ilog-tag{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:2px 8px;border-radius:20px;}
.ilog-time{font-size:11px;color:var(--text3);}
.ilog-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.ilog-prod{font-size:12px;color:var(--text2);margin-bottom:8px;}
.ilog-q{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px;}
.ilog-a{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5;}
.del-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;}
.del-btn:hover{color:#ef4444;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.empty-icon{font-size:36px;margin-bottom:10px;}

/* ══ SETTINGS PAGE ══ */
.settings-row{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.settings-row .sr-left{}
.sr-label{font-size:15px;font-weight:500;margin-bottom:3px;}
.sr-desc{font-size:12px;color:var(--text2);}
/* iOS-style toggle */
.toggle{position:relative;width:48px;height:28px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{
  position:absolute;inset:0;border-radius:28px;
  background:var(--border2);cursor:pointer;transition:.2s;
}
.slider::before{
  content:'';position:absolute;width:22px;height:22px;
  border-radius:50%;background:#fff;left:3px;top:3px;
  transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.15);
}
input:checked+.slider{background:var(--accent);}
input:checked+.slider::before{transform:translateX(20px);}

/* ══ STATS PAGE ══ */
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:16px;box-shadow:var(--shadow);
}
.stat-card-title{
  font-size:12px;font-weight:700;color:var(--text3);
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.stat-card-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;}
.kpi-mini{text-align:center;}
.kpi-n{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:2px;}
.kpi-l{font-size:11px;color:var(--text3);}

/* legacy stats (still used for bar-list fallback) */
.stats-section{margin-bottom:14px;}
.stats-section h3{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center;box-shadow:var(--shadow);}
.metric-num{font-size:20px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;line-height:1;margin-bottom:3px;}
.metric-label{font-size:11px;color:var(--text3);}
.bar-list{display:flex;flex-direction:column;gap:7px;}
.bar-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 13px;}
.bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.bar-label{font-size:12px;font-weight:500;}
.bar-val{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;}
.bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}

/* ══ GLOBAL UTILS ══ */
.lbar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:999;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.lbar.on{transform:scaleX(.75);}
.lbar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .3s .1s;}
.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%);background:#1c1e2e;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}

/* ══ STAGE PALETTE ══ */
/* defined in JS for dynamic use */
</style>
</head>
<body>

<div class="lbar" id="lbar"></div>
<div class="toast" id="toast"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">🔧 小家電維修所</div>
  <div class="topbar-right">
    <div class="sync-pill" id="sync-pill">
      <div class="sdot" id="sdot"></div>
      <span id="slbl">連線中…</span>
    </div>
    <button class="tbtn" onclick="fetchData()">⟳</button>
  </div>
</div>

<!-- ═══ PAGE: REPAIR ═══ -->
<div class="page active" id="page-repair">
  <div class="repair-header">
    <h1>維修看板</h1>
  </div>
  <!-- 搜尋框：膠囊形，位於chips上方 -->
  <div class="searchbar">
    <div class="sbox">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
      <input type="search" id="q" placeholder="搜尋姓名、編號、品項…" autocomplete="off">
    </div>
  </div>
  <!-- 階段篩選：兩列換行 -->
  <div class="fbar" id="fbar">
    <button class="chip" id="chip-all" onclick="toggleAll(this)">全部</button>
    <!-- stage chips injected by JS -->
  </div>
  <div class="board-wrap">
    <div class="board" id="board">
      <div style="padding:40px;color:var(--text3);font-size:14px;">載入中…</div>
    </div>
  </div>
</div>

<!-- ═══ PAGE: INTERVIEW ═══ -->
<div class="page" id="page-interview">
  <div class="page-inner">
    <div class="page-header">
      <h2>👋 訪問記錄</h2>
      <p>輸入品項搜尋送修家電，綁定訪問內容</p>
    </div>

    <!-- Search & bind -->
    <div class="card-box">
      <h3>🔍 搜尋送修家電</h3>
      <div class="form-row">
        <label>輸入品項 / 姓名 / 編號</label>
        <input class="form-inp" id="iv-search" type="text" placeholder="例：電風扇、王小明…" oninput="ivSearch()" autocomplete="off">
      </div>
      <div class="match-list" id="iv-matches"></div>
    </div>

    <!-- Interview questions — only shown when interviewEnabled -->
    <div id="iv-form-wrap">
      <div class="card-box" id="iv-selected-info" style="display:none;border-color:var(--accent);background:var(--accent-bg);">

<script>
// ═══════════════════════════════════════════
// CONFIG (可在設定頁修改)
// ═══════════════════════════════════════════
let GAS_URL = localStorage.getItem('gasUrl') || 'https://script.google.com/macros/s/AKfycbxREDKG37n6FACiFa3YsZa0giUDwkV1lRR_fpoi9YY7VJw0Y3vy8KfjV0Wp4hLu0Bc0/exec';

const STAGES = [
  {key:'未報到',        ci:0},
  {key:'已報到等待維修',ci:1},
  {key:'維修中',        ci:2},
  {key:'待領取',        ci:3},
  {key:'已領取',        ci:4},
  {key:'轉診或待確認',  ci:5},
];

const PALETTE = [
  {sc:'#fff',sbg:'#94a3b8',colBg:'#f1f5f9',circleBg:'#e2e8f0',circleColor:'#475569'},
  {sc:'#fff',sbg:'#3b82f6',colBg:'#eff6ff',circleBg:'#dbeafe',circleColor:'#1d4ed8'},
  {sc:'#fff',sbg:'#f97316',colBg:'#fff7ed',circleBg:'#fed7aa',circleColor:'#c2410c'},
  {sc:'#fff',sbg:'#8b5cf6',colBg:'#f5f3ff',circleBg:'#ede9fe',circleColor:'#6d28d9'},
  {sc:'#fff',sbg:'#10b981',colBg:'#ecfdf5',circleBg:'#d1fae5',circleColor:'#065f46'},
  {sc:'#fff',sbg:'#ef4444',colBg:'#fef2f2',circleBg:'#fecaca',circleColor:'#b91c1c'},
];

// ══ STATE ══
let allCards   = [];
let activeKeys = new Set();
let searchQ    = '';
let refreshTimer = null;
let chipsBuilt = false;
let currentTab = 'repair';
let interviewEnabled = true;
let autoSync   = true;
let selectedCard = null; // for interview binding
let interviews = JSON.parse(localStorage.getItem('interviews')||'[]');

// ══ SETTINGS ══
function loadSettings(){
  const gs = localStorage.getItem('gasUrl');
  if(gs){ GAS_URL=gs; document.getElementById('gas-url-input').value=gs; }
  const ie = localStorage.getItem('interviewEnabled');
  interviewEnabled = ie===null ? true : ie==='true';
  document.getElementById('toggle-interview').checked = interviewEnabled;
  const as = localStorage.getItem('autoSync');
  autoSync = as===null ? true : as==='true';
  document.getElementById('toggle-autosync').checked = autoSync;
  applyInterviewSetting();
}
function saveSettings(){
  const url = document.getElementById('gas-url-input').value.trim();
  if(url) { GAS_URL=url; localStorage.setItem('gasUrl',url); }
  interviewEnabled = document.getElementById('toggle-interview').checked;
  localStorage.setItem('interviewEnabled', interviewEnabled);
  autoSync = document.getElementById('toggle-autosync').checked;
  localStorage.setItem('autoSync', autoSync);
  applyInterviewSetting();
  if(autoSync) startAuto(); else clearInterval(refreshTimer);
}
function applyInterviewSetting(){
  // show/hide interview tab indicator
  const ivTab = document.getElementById('tab-interview');
  ivTab.style.opacity = interviewEnabled ? '1' : '0.4';
  document.getElementById('iv-form-wrap').style.display = interviewEnabled ? '' : 'none';
}

// ══ TAB SWITCHING ══
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='stats') renderStats();
  if(tab==='interview') renderInterviewLog();
}

// ══ DATA MAPPING ══
function mapCard(raw){
  const phone = String(raw.phone||raw['送件者電話']||'');
  let phone3  = String(raw.phone3||raw['電話後3碼']||'');
  if(!phone3&&phone){ const d=phone.replace(/\D/g,''); phone3=d.length>=3?d.slice(-3):d; }
  const rawId = String(raw.id||raw['編號']||'').trim();
  const stage = (raw.stage||raw['流程階段']||raw.status||'').trim()||'未報到';
  return{
    id:rawId, endOfProduct:raw.endOfProduct||raw['End of 產品']||raw.item||'',
    phone3, name:raw.name||raw['送修者姓名']||raw['姓名']||'',
    phone, regNum:raw.regNum||rawId||'',
    stage, noteTag:raw.noteTag||raw['備註標籤']||'',
    bigCat:raw.bigCat||raw['家電大分類']||raw['產品分類']||'',
    item:raw.item||raw['產品品項']||'',
    subItem:raw.subItem||raw['產品細項']||'',
    itemNote:raw.itemNote||raw['產品備註']||raw['備註說明']||'',
    brand:raw.brand||raw['品牌']||'',
    model:raw.model||raw['型號']||'',
    accessories:String(raw.accessories||raw['配件']||''),
    mfgDate:raw.mfgDate||raw['出廠日期']||'',
    price:raw.price||raw['產品價格']||'',
    faultDesc:raw.faultDesc||raw['故障說明']||'',
    opened:raw.opened||raw['是否拆過']||'',
    extraNote:raw.extraNote||raw['其他備註']||'',
    repairResult:raw.repairResult||raw['維修_結果分類']||'',
    repairResultDesc:raw.repairResultDesc||raw['維修_結果說明']||'',
    repairNote:raw.repairNote||raw['維修_補充備註']||'',
    repairman:raw.repairman||raw['維修者']||'',
    partCost:String(raw.partCost||raw['零件費']||''),
    donationFee:String(raw.donationFee||raw['隨喜費']||''),
    ecoContrib:raw.ecoContrib||raw['減碳貢獻']||'',
  };
}

// ══ FETCH ══
function fetchData(){
  setSyncState('syncing','同步中…');setLBar(true);
  const cb='_gc_'+Date.now();
  const s=document.createElement('script');
  s.src=GAS_URL+'?action=get&callback='+cb+'&t='+Date.now();
  let done=false;
  window[cb]=function(resp){
    done=true;try{document.head.removeChild(s);}catch(e){}delete window[cb];
    if(resp&&resp.data&&resp.data.length>0){
      allCards=resp.data.map(mapCard);
      buildStageChips();render();
      const now=new Date();
      setSyncState('ok',now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+' 同步');
    } else { setSyncState('err','無資料'); if(!allCards.length)loadDemo(); }
    setLBar(false);
  };
  s.onerror=function(){
    if(!done){done=true;try{document.head.removeChild(s);}catch(e){}delete window[cb];
    setSyncState('err','連線失敗');setLBar(false);if(!allCards.length)loadDemo();}
  };
  setTimeout(()=>{if(!done)s.onerror();},12000);
  document.head.appendChild(s);
}

function gasUpdate(params,onOk,onErr){
  const cb='_gu_'+Date.now();
  const qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  const s=document.createElement('script');
  s.src=GAS_URL+'?action=update&callback='+cb+'&'+qs;
  let done=false;
  window[cb]=function(resp){done=true;try{document.head.removeChild(s);}catch(e){}delete window[cb];
    if(resp&&resp.result==='success')onOk&&onOk(resp);else onErr&&onErr(resp);};
  s.onerror=function(){if(!done){done=true;try{document.head.removeChild(s);}catch(e){}delete window[cb];onErr&&onErr();}};
  setTimeout(()=>{if(!done)s.onerror();},10000);
  document.head.appendChild(s);
}

// ══ REPAIR: BUILD CHIPS ══
function buildStageChips(){
  if(chipsBuilt)return;chipsBuilt=true;
  const fbar=document.getElementById('fbar');
  STAGES.forEach(s=>{
    const p=PALETTE[s.ci];
    const btn=document.createElement('button');
    btn.className='chip';btn.dataset.key=s.key;btn.dataset.ci=s.ci;
    btn.textContent=s.key;btn.onclick=function(){toggleStage(s.key,this);};
    fbar.appendChild(btn);
  });
  updateAllChip();
}
function toggleStage(key,el){
  if(activeKeys.has(key)){activeKeys.delete(key);el.classList.remove('on');el.style.background='';el.style.color='';}
  else{activeKeys.add(key);const p=PALETTE[parseInt(el.dataset.ci||'0')];el.classList.add('on');el.style.background=p.sbg;el.style.color='#fff';}
  updateAllChip();render();
}
function toggleAll(){
  activeKeys.clear();
  document.querySelectorAll('#fbar .chip[data-key]').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  updateAllChip();render();
}
function updateAllChip(){
  const btn=document.getElementById('chip-all');if(!btn)return;
  if(activeKeys.size===0){btn.classList.add('on');btn.style.background='var(--accent)';btn.style.color='#fff';}
  else{btn.classList.remove('on');btn.style.background='';btn.style.color='';}
}

// ══ REPAIR: RENDER BOARD ══
function render(){
  const q=searchQ.toLowerCase();
  const showStages=activeKeys.size>0?STAGES.filter(s=>activeKeys.has(s.key)):STAGES;
  const filtered=allCards.filter(c=>{
    if(activeKeys.size>0&&!activeKeys.has(c.stage))return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.phone.includes(q)&&!String(c.id).includes(q)&&!c.endOfProduct.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('board').innerHTML=showStages.map(stage=>{
    const p=PALETTE[stage.ci];
    const sc=filtered.filter(c=>c.stage===stage.key);
    const idStr=id=>{const d=String(id||'').replace(/\D/g,'');return d?d.slice(-2):'';}
    const cHtml=sc.length?sc.map(c=>`
      <div class="kcard" onclick="openModal('${escH(c.id||'__empty__')}','${escH(stage.key)}')">
        <div class="kcard-inner">
          <div class="knum-circle" style="background:${p.circleBg};color:${p.circleColor};">${idStr(c.id)}</div>
          <div class="kcard-info">
            <div class="k-product">${escH(c.endOfProduct||c.item||'—')}</div>
            <div class="k-name">${escH(c.name||'—')}</div>
          </div>
        </div>
      </div>`).join(''):`<div class="empty-col">暫無工單</div>`;
    return`<div class="col">
      <div class="col-hd" style="background:${p.sbg};"><span class="cname" style="color:${p.sc};">${stage.key}</span><span class="ccnt" style="color:${p.sc};">${sc.length}</span></div>
      <div class="col-body" style="background:${p.colBg};">${cHtml}</div>
    </div>`;
  }).join('');
}

// ══ REPAIR: MODAL ══
let _modalStageKey='';
function openModal(id,stageKey){
  _modalStageKey=stageKey||'';
  const isEmpty=id==='__empty__';
  const c=isEmpty?allCards.find(x=>!x.id&&x.stage===stageKey):allCards.find(x=>String(x.id)===String(id));
  if(!c)return;
  const ci=STAGES.findIndex(s=>s.key===c.stage);
  const p=PALETTE[ci<0?0:ci];
  const mc=document.getElementById('m-circle');
  const idD=String(c.id||'').replace(/\D/g,'');
  mc.textContent=idD?idD.slice(-2):'';
  mc.style.background=p.circleBg;mc.style.color=p.circleColor;
  document.getElementById('m-num').textContent=c.id?'掛號 '+c.id:'（未編號）';
  document.getElementById('m-title').textContent=(c.endOfProduct||c.item||'—')+' · '+(c.name||'—');
  const accList=c.accessories?c.accessories.split(/[,，、\s]+/).filter(Boolean):[];
  const accHtml=accList.length?accList.map(a=>`<span class="acc-item on" onclick="this.classList.toggle('on')" data-acc="${escH(a)}">${escH(a)}</span>`).join(''):'<span style="font-size:12px;color:var(--text3)">無</span>';
  const stageOpts=STAGES.map(s=>`<option value="${escH(s.key)}"${c.stage===s.key?' selected':''}>${s.key}</option>`).join('');
  const boolPill=v=>{
    const y=['是','true','1','yes','有'].includes(String(v).toLowerCase());
    const n=['否','false','0','no','無'].includes(String(v).toLowerCase());
    if(y)return`<span class="pill pill-y">✔ 是</span>`;
    if(n)return`<span class="pill pill-n">✘ 否</span>`;
    return`<span class="pill pill-n">${escH(v)||'—'}</span>`;
  };
  const sid=c.id||'noid';
  document.getElementById('m-body').innerHTML=`
    <div class="m-hero-strip">
      <div><div style="font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;">掛號號碼</div>
      <div class="m-hero-id">${escH(c.regNum||c.id||'—')}</div></div>
      <div class="m-hero-stage" style="background:${p.circleBg};color:${p.circleColor};">${escH(c.stage)}</div>
    </div>
    <div class="msec">
      <div class="msec-title"><div class="msec-icon" style="background:#eff4ff;color:#2563eb;">👤</div>客戶資訊</div>
      <div class="trow"><span class="tl">送修者</span><span class="tv bold">${escH(c.name||'—')}</span></div>
      <div class="trow"><span class="tl">電話後3碼</span><span class="tv mono" style="font-size:18px;font-weight:700;letter-spacing:2px;">${escH(c.phone3||'—')}</span></div>
      ${c.phone?`<div class="trow"><span class="tl">聯絡電話</span><a class="call-link" href="tel:${escH(c.phone)}">📞 ${escH(c.phone)}</a></div>`:''}
    </div>
    <div class="msec" style="border-top:1px solid var(--border);padding-top:16px;">
      <div class="msec-title"><div class="msec-icon" style="background:#fff7ed;color:#c2410c;">📦</div>產品資訊</div>
      <div class="trow"><span class="tl">End of 產品</span><span class="tv bold">${escH(c.endOfProduct||'—')}</span></div>
      <div class="trow"><span class="tl">分類 / 品項</span><span class="tv">${escH(c.bigCat||'—')} / ${escH(c.item||'—')}</span></div>
      <div class="trow"><span class="tl">品牌 / 型號</span><span class="tv">${escH(c.brand||'—')} <span class="mono">${escH(c.model||'—')}</span></span></div>
      <div class="trow"><span class="tl">出廠 / 價格</span><span class="tv">${escH(c.mfgDate||'—')} / ${escH(c.price||'—')}</span></div>
      <div class="trow"><span class="tl">是否拆過</span><span class="tv">${boolPill(c.opened)}</span></div>
      <div class="trow"><span class="tl">配件</span><span class="tv"><div class="acc-wrap" id="acc-${escH(sid)}">${accHtml}</div></span></div>
    </div>
    <div class="msec" style="border-top:1px solid var(--border);padding-top:16px;">

      <div class="trow edit"><span class="tl">補充備註</span><textarea class="mta" id="mi-repnote-${escH(sid)}" placeholder="補充備註…">${escH(c.repairNote)}</textarea></div>

        <div class="two-inp"><input class="minput" id="mi-cost-${escH(sid)}" value="${escH(c.partCost)}" placeholder="零件費" inputmode="numeric">

  document.getElementById('mov').style.display='flex';
  document.body.style.overflow='hidden';
}

function saveCard(id,sid){
  const c=id?allCards.find(x=>String(x.id)===String(id)):allCards.find(x=>!x.id&&x.stage===_modalStageKey);
  if(!c)return;
  const btn=document.getElementById('save-btn-'+sid);
  const g=eid=>{const el=document.getElementById(eid);return el?el.value.trim():'';};
  const newStage=g('mi-stage-'+sid)||c.stage;
  const accWrap=document.getElementById('acc-'+sid);
  const accOn=accWrap?[...accWrap.querySelectorAll('.acc-item.on')].map(el=>el.dataset.acc).join('、'):'';
  c.stage=newStage;c.repairResult=g('mi-result-'+sid);c.repairResultDesc=g('mi-resdesc-'+sid);
  c.repairNote=g('mi-repnote-'+sid);c.partCost=g('mi-cost-'+sid);c.extraNote=g('mi-extra-'+sid);
  c.repairman=g('mi-repairman-'+sid);if(accOn)c.accessories=accOn;
  btn.disabled=true;btn.textContent='同步中…';
  gasUpdate({id:c.id,status:newStage,result:c.repairResult,notes:c.repairResultDesc,repairNote:c.repairNote,repairman:c.repairman,cost:c.partCost,extraNote:c.extraNote,accessories:c.accessories},
    resp=>{btn.disabled=false;btn.textContent='儲存並同步至 Google Sheets';showToast('✓ 已同步（列 '+resp.row+'）');closeModal();render();},
    ()=>{btn.disabled=false;btn.textContent='儲存並同步至 Google Sheets';showToast('⚠ 本機已更新，同步失敗');closeModal();render();}
  );
}
function closeModal(){document.getElementById('mov').style.display='none';document.body.style.overflow='';}
function closeBg(e){if(e.target===document.getElementById('mov'))closeModal();}

// ══ INTERVIEW ══
function ivSearch(){
  const q=document.getElementById('iv-search').value.trim().toLowerCase();
  const wrap=document.getElementById('iv-matches');
  if(!q){wrap.innerHTML='';return;}
  const matches=allCards.filter(c=>
    c.endOfProduct.toLowerCase().includes(q)||c.item.toLowerCase().includes(q)||
    c.name.toLowerCase().includes(q)||String(c.id).includes(q)
  ).slice(0,8);
  if(!matches.length){wrap.innerHTML='<div style="font-size:13px;color:var(--text3);padding:8px 0;">找不到符合的送修家電</div>';return;}
  const ci=i=>STAGES.findIndex(s=>s.key===allCards.find(c=>c===i)?.stage)||0;
  wrap.innerHTML=matches.map(c=>{
    const stageIdx=STAGES.findIndex(s=>s.key===c.stage);
    const p=PALETTE[stageIdx<0?0:stageIdx];
    const idD=String(c.id||'').replace(/\D/g,'');
    const isSel=selectedCard&&selectedCard.id===c.id;
    return`<div class="match-item${isSel?' selected':''}" onclick="selectCard('${escH(c.id||'')}')">
      <div class="match-num" style="background:${p.circleBg};color:${p.circleColor};">${idD?idD.slice(-2):''}</div>
      <div class="match-info">
        <div class="mi-name">${escH(c.name||'—')}</div>
        <div class="mi-prod">${escH(c.endOfProduct||c.item||'—')} · ${escH(c.stage)}</div>
      </div>
      ${isSel?'<span class="match-check">✓</span>':''}
    </div>`;
  }).join('');
}

function selectCard(id){
  selectedCard=allCards.find(x=>String(x.id)===String(id))||null;
  const info=document.getElementById('iv-selected-info');
  const submitBtn=document.getElementById('iv-submit');
  if(selectedCard){
    info.style.display='';
    document.getElementById('iv-selected-name').textContent=selectedCard.name||'—';
    document.getElementById('iv-selected-prod').textContent=(selectedCard.endOfProduct||selectedCard.item||'—')+' · '+selectedCard.stage;
    submitBtn.disabled=false;
  } else {
    info.style.display='none';
    submitBtn.disabled=true;
  }
  ivSearch(); // refresh highlight
}

function submitInterview(){
  if(!selectedCard)return;
  const q1=document.getElementById('iv-q1').value.trim();
  const q2=document.getElementById('iv-q2').value.trim();
  if(!q1&&!q2){showToast('請至少填寫一個問題的回答');return;}
  const rec={
    id: Date.now(),
    cardId: selectedCard.id,
    name: selectedCard.name||'—',
    product: selectedCard.endOfProduct||selectedCard.item||'—',
    stage: selectedCard.stage,
    q1,q2,
    time: new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
  };
  interviews.unshift(rec);
  localStorage.setItem('interviews',JSON.stringify(interviews));
  // reset
  document.getElementById('iv-q1').value='';
  document.getElementById('iv-q2').value='';
  document.getElementById('iv-search').value='';
  document.getElementById('iv-matches').innerHTML='';
  document.getElementById('iv-selected-info').style.display='none';
  document.getElementById('iv-submit').disabled=true;
  selectedCard=null;
  showToast('✓ 訪問記錄已儲存');
  renderInterviewLog();
}

function renderInterviewLog(){
  const log=document.getElementById('iv-log');
  const cnt=document.getElementById('iv-count');
  cnt.textContent='('+interviews.length+')';
  if(!interviews.length){
    log.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>尚無訪問記錄</div>';
    return;
  }
  log.innerHTML=interviews.map(r=>`
    <div class="ilog-item">
      <div class="ilog-head">
        <span class="ilog-tag">#${escH(String(r.cardId||''))}</span>
        <span class="ilog-time">${escH(r.time)}</span>
      </div>
      <div class="ilog-name">${escH(r.name)}</div>
      <div class="ilog-prod">${escH(r.product)} · ${escH(r.stage)}</div>
      ${r.q1?`<div class="ilog-q">為什麼知道我們的活動？</div><div class="ilog-a">${escH(r.q1)}</div>`:''}
      ${r.q2?`<div class="ilog-q">如何讓活動做得更好？</div><div class="ilog-a">${escH(r.q2)}</div>`:''}
      <button class="del-btn" onclick="deleteInterview(${r.id})">✕ 刪除</button>
    </div>`).join('');
}

function deleteInterview(id){
  interviews=interviews.filter(r=>r.id!==id);
  localStorage.setItem('interviews',JSON.stringify(interviews));
  renderInterviewLog();
}
function clearAllInterviews(){
  if(!confirm('確定要清除所有訪問記錄？'))return;
  interviews=[];localStorage.setItem('interviews','[]');
  renderInterviewLog();
}

// ══ STATS ══
function renderStats(){
  const el=document.getElementById('stats-content');

  const total=allCards.length;
  const done=allCards.filter(c=>c.stage==='已領取').length;
  const referred=allCards.filter(c=>c.stage==='轉診或待確認').length;
  const inProgress=allCards.filter(c=>c.stage==='維修中').length;
  const waiting=allCards.filter(c=>c.stage==='已報到等待維修').length;
  const pending=allCards.filter(c=>c.stage==='未報到').length;
  const readyPickup=allCards.filter(c=>c.stage==='待領取').length;

  // 完成率 = 已領取 / (已領取+轉診)
  const repaired=done;
  const failed=referred;
  const attempted=repaired+failed;
  const successRate=attempted?Math.round(repaired/attempted*100):0;
  const failRate=attempted?Math.round(failed/attempted*100):0;

  // category
  const catMap={};
  allCards.forEach(c=>{const k=c.bigCat||'未分類';catMap[k]=(catMap[k]||0)+1;});
  const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=Math.max(...catList.map(x=>x[1]),1);

  // item breakdown
  const itemMap={};
  allCards.forEach(c=>{const k=c.item||c.endOfProduct||'未知';itemMap[k]=(itemMap[k]||0)+1;});
  const itemList=Object.entries(itemMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxItem=Math.max(...itemList.map(x=>x[1]),1);

  // ── stage bar chart data ──
  const stageData=STAGES.map(s=>({label:s.key,count:allCards.filter(c=>c.stage===s.key).length,p:PALETTE[s.ci]}));
  const maxStage=Math.max(...stageData.map(x=>x.count),1);

  // ── interview stats ──
  const ivTotal=interviews.length;
  const ivCards=new Set(interviews.map(r=>r.cardId)).size;

  // keyword cloud from q1+q2
  const stopWords=new Set(['的','了','我','是','有','在','和','你','他','她','我','這','那','也','都','但','就','很','要','可以','希望','如果','因為','所以','一個','可','不','沒有','這個','一些','或者','還有','以及','讓','做','更','活動','我們']);
  const wordMap={};
  interviews.forEach(r=>{
    [r.q1||'',r.q2||''].join(' ').replace(/[，。！？、；：""''「」【】\s]+/g,' ').split(' ')
      .forEach(w=>{w=w.trim();if(w.length>=2&&!stopWords.has(w)){wordMap[w]=(wordMap[w]||0)+1;}});
  });
  const wordList=Object.entries(wordMap).sort((a,b)=>b[1]-a[1]).slice(0,30);
  const maxW=wordList.length?wordList[0][1]:1;

  // ring SVG helper
  function ringChart(pct,color,label,sub){
    const r=38,cx=50,cy=50;
    const circ=2*Math.PI*r;
    const dash=circ*pct/100;
    return`<div style="text-align:center;flex:1;">
      <svg viewBox="0 0 100 100" width="90" height="90">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e8eaf0" stroke-width="10"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
          stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ*0.25}" stroke-linecap="round"
          style="transition:stroke-dasharray .6s ease;"/>
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
          font-size="16" font-weight="700" fill="${color}" font-family="'DM Mono',monospace">${pct}%</text>
      </svg>
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-top:2px;">${label}</div>
      <div style="font-size:11px;color:var(--text3);">${sub}</div>
    </div>`;
  }

  // column bar chart helper
  function colChart(items,maxVal,colorFn){
    const barW=Math.max(20,Math.floor(240/items.length)-4);
    return`<div style="display:flex;align-items:flex-end;gap:6px;height:90px;padding:0 4px;">
      ${items.map(([k,v])=>{
        const h=Math.max(4,Math.round(v/maxVal*80));
        return`<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;">
          <div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px;">${v}</div>
          <div style="width:100%;max-width:36px;height:${h}px;background:${colorFn(k,v)};border-radius:4px 4px 0 0;"></div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:6px;padding:4px 4px 0;border-top:1px solid var(--border);margin-top:4px;">
      ${items.map(([k])=>`<div style="flex:1;min-width:0;font-size:10px;color:var(--text3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escH(k)}</div>`).join('')}
    </div>`;
  }

  el.innerHTML=`
  <!-- ① 總覽 KPI -->
  <div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">整體送件數</div>
    <div style="font-size:40px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;line-height:1;margin-bottom:10px;">${total}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
      <div class="kpi-mini"><div class="kpi-n" style="color:#3b82f6;">${waiting}</div><div class="kpi-l">等待維修</div></div>
      <div class="kpi-mini"><div class="kpi-n" style="color:#f97316;">${inProgress}</div><div class="kpi-l">維修中</div></div>
      <div class="kpi-mini"><div class="kpi-n" style="color:#8b5cf6;">${readyPickup}</div><div class="kpi-l">待領取</div></div>
      <div class="kpi-mini"><div class="kpi-n" style="color:#10b981;">${done}</div><div class="kpi-l">已領取</div></div>
      <div class="kpi-mini"><div class="kpi-n" style="color:#94a3b8;">${pending}</div><div class="kpi-l">未報到</div></div>
      <div class="kpi-mini"><div class="kpi-n" style="color:#ef4444;">${referred}</div><div class="kpi-l">轉診</div></div>
    </div>
  </div>

  <!-- ② 維修率分析 -->
  <div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">維修率分析</div>
    <div style="display:flex;justify-content:space-around;align-items:flex-start;padding:8px 0 4px;">
      ${ringChart(total?Math.round(attempted/total*100):0,'#2563eb','整體維修率',attempted+' / '+total+' 件')}
      ${ringChart(successRate,'#10b981','成功維修率',repaired+' 件已領取')}
      ${ringChart(failRate,'#ef4444','轉診比率',failed+' 件轉診')}
    </div>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px;">以已領取視為成功，轉診視為暫不成功</div>
  </div>

  <!-- ③ 各階段分佈（直條圖） -->
  <div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">各階段分佈</div>
    ${colChart(stageData.map(x=>[x.label,x.count]),maxStage,(k)=>stageData.find(x=>x.label===k)?.p?.sbg||'#94a3b8')}
  </div>

  <!-- ④ 送修家電分類分析 -->
  ${catList.length?`<div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">送修家電分類</div>
    ${colChart(catList.slice(0,7),maxCat,()=>'#3b82f6')}
  </div>`:''}

  <!-- ⑤ 送修品項 TOP 8 水平條 -->
  ${itemList.length?`<div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">送修品項分析（前 8）</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-top:6px;">
      ${itemList.map(([k,v],i)=>`
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
          <span style="color:var(--text2);font-weight:500;">${escH(k)}</span>
          <span style="font-weight:600;font-family:'DM Mono',monospace;">${v}</span>
        </div>
        <div style="height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${Math.round(v/maxItem*100)}%;background:${['#3b82f6','#10b981','#f97316','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f59e0b'][i%8]};border-radius:4px;"></div>
        </div>
      </div>`).join('')}
    </div>
  </div>`:''}

  <!-- ⑥ 關鍵字雲 -->
  <div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">訪問關鍵字雲</div>
    ${wordList.length?`
    <div style="display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:8px 0;line-height:1.6;">
      ${wordList.map(([w,c])=>{
        const sz=Math.round(11+((c-1)/(maxW||1))*14);
        const op=0.5+0.5*(c/maxW);
        const colors=['#2563eb','#10b981','#f97316','#8b5cf6','#ec4899','#0891b2'];
        const col=colors[Math.abs(w.charCodeAt(0))%colors.length];
        return`<span style="font-size:${sz}px;font-weight:${c>1?600:400};color:${col};opacity:${op.toFixed(2)};cursor:default;transition:opacity .2s;" title="${c}次">${escH(w)}</span>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:6px;">共 ${ivTotal} 筆訪問，${Object.keys(wordMap).length} 個關鍵詞</div>
    `:`<div style="text-align:center;padding:24px 0;font-size:13px;color:var(--text3);">
      <div style="font-size:28px;margin-bottom:8px;">💬</div>尚無訪問資料
    </div>`}
  </div>

  <!-- ⑦ 訪問摘要 -->
  <div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">訪問紀錄摘要</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div class="kpi-mini" style="background:var(--accent-bg);border-radius:9px;padding:10px;"><div class="kpi-n" style="color:var(--accent);font-size:22px;">${ivTotal}</div><div class="kpi-l">訪問總筆數</div></div>
      <div class="kpi-mini" style="background:#f0fdf4;border-radius:9px;padding:10px;"><div class="kpi-n" style="color:#10b981;font-size:22px;">${ivCards}</div><div class="kpi-l">涵蓋送修者</div></div>
    </div>
  </div>
  `;}

function setLBar(on){
  const b=document.getElementById('lbar');
  b.className='lbar'+(on?' on':' done');

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  const r=a=>a[Math.floor(Math.random()*a.length)];
  allCards=Array.from({length:20},(_,i)=>({
    id:i%5===0?'':String(i+1).padStart(3,'0'),
    name:r(names),phone:'0912'+String(Math.floor(Math.random()*9000)+1000),
    phone3:String(Math.floor(Math.random()*900)+100),
    endOfProduct:r(prods),item:r(prods),subItem:'家用型',
    bigCat:r(cats),brand:r(brands),
    model:'M'+String(Math.floor(Math.random()*9000)+1000),
    accessories:'電源線、遙控器',mfgDate:'2020-01',price:'',
    faultDesc:'無法正常啟動',itemNote:'',noteTag:'',
    opened:Math.random()>.5?'是':'否',regNum:String(i+1).padStart(4,'0'),
    extraNote:'',repairResult:'',repairResultDesc:'',
    repairNote:'',repairman:'',partCost:'',donationFee:'',ecoContrib:'',
    stage:i%5===0?'未報到':r(stgList),
  }));
  setSyncState('err','示範資料');
  buildStageChips();render();
}

// ══ AUTO REFRESH ══
function startAuto(){clearInterval(refreshTimer);if(autoSync)refreshTimer=setInterval(fetchData,30000);}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&autoSync)fetchData();});
document.getElementById('q').addEventListener('input',function(){searchQ=this.value.trim();render();});

// ══ INIT ══
loadSettings();
if(GAS_URL&&GAS_URL.includes('script.google.com')){fetchData();startAuto();}
else{setSyncState('err','請設定 GAS URL');loadDemo();}
renderInterviewLog();
</script>
