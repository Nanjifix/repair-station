<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>酷澎鍋具採購 · 每日情資看板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ee;
  --border:rgba(0,0,0,.10);--border-strong:rgba(0,0,0,.18);
  --text:#1a1917;--text2:#6b6860;--text3:#a09e98;
  --radius-md:8px;--radius-lg:12px;
  --red-bg:#FCEBEB;--red-bd:#F7C1C1;--red-tx:#A32D2D;
  --amber-bg:#FAEEDA;--amber-bd:#FAC775;--amber-tx:#854F0B;
  --blue-bg:#E6F1FB;--blue-bd:#B5D4F4;--blue-tx:#185FA5;
  --teal-bg:#E1F5EE;--teal-bd:#9FE1CB;--teal-tx:#0F6E56;
  --green-bg:#EAF3DE;--green-bd:#C0DD97;--green-tx:#3B6D11;
  --gray-bg:#F1EFE8;--gray-bd:#D3D1C7;--gray-tx:#5F5E5A;
  --gold:#EF9F27;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1917;--surface:#242320;--surface2:#2e2d2a;
  --border:rgba(255,255,255,.10);--border-strong:rgba(255,255,255,.18);
  --text:#f0ede8;--text2:#9c9a93;--text3:#6b6860;
  --red-bg:#501313;--red-bd:#791F1F;--red-tx:#F09595;
  --amber-bg:#412402;--amber-bd:#633806;--amber-tx:#FAC775;
  --blue-bg:#042C53;--blue-bd:#0C447C;--blue-tx:#85B7EB;
  --teal-bg:#04342C;--teal-bd:#085041;--teal-tx:#5DCAA5;
  --green-bg:#173404;--green-bd:#27500A;--green-tx:#97C459;
  --gray-bg:#2C2C2A;--gray-bd:#444441;--gray-tx:#B4B2A9;
  --gold:#FAC775;
}}
html,body{height:100%;}
body{font-family:-apple-system,'Hiragino Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
.app{max-width:1200px;margin:0 auto;padding:28px 20px 60px;}

/* Header */
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.brand{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:500;}
.main-title{font-size:22px;font-weight:500;color:var(--text);margin-top:4px;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.date-badge,.refresh-btn{font-size:12px;color:var(--text2);background:var(--surface);padding:5px 13px;border-radius:20px;border:.5px solid var(--border);}
.refresh-btn{cursor:pointer;display:flex;align-items:center;gap:5px;}
.refresh-btn:hover{background:var(--surface2);}
.refresh-icon{display:inline-block;}
.refresh-btn.spinning .refresh-icon{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.last-updated{font-size:11px;color:var(--text3);}

/* Tabs */
.view-tabs{display:flex;margin-bottom:16px;border-bottom:.5px solid var(--border);}
.view-tab{font-size:13px;padding:8px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text3);cursor:pointer;margin-bottom:-.5px;}
.view-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
.view-tab:hover{color:var(--text2);}

/* ── AI SEARCH BOX ── */
.ai-search-box{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;}
.ai-search-label{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ai-badge{font-size:10px;padding:1px 7px;border-radius:4px;background:var(--blue-bg);border:.5px solid var(--blue-bd);color:var(--blue-tx);}
.ai-search-row{display:flex;gap:8px;}
.ai-search-input{flex:1;font-size:13px;padding:9px 14px;border:.5px solid var(--border-strong);border-radius:var(--radius-md);background:var(--surface2);color:var(--text);outline:none;}
.ai-search-input:focus{border-color:#378ADD;background:var(--surface);}
.ai-search-input::placeholder{color:var(--text3);}
.ai-search-btn{font-size:12px;padding:9px 18px;border-radius:var(--radius-md);border:.5px solid var(--border);background:var(--text);color:var(--bg);cursor:pointer;white-space:nowrap;font-weight:500;}
.ai-search-btn:hover{opacity:.85;}
.ai-search-btn:disabled{opacity:.5;cursor:not-allowed;}
.ai-result-box{margin-top:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-md);border:.5px solid var(--border);display:none;}
.ai-result-box.show{display:block;}
.ai-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ai-result-title{font-size:12px;font-weight:500;color:var(--text);}
.ai-result-close{background:none;border:none;font-size:14px;color:var(--text3);cursor:pointer;padding:0 2px;}
.ai-result-close:hover{color:var(--text);}
.ai-result-content{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
.ai-result-content a{color:#378ADD;text-decoration:none;}
.ai-result-content a:hover{text-decoration:underline;}
.ai-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:pulse 1.2s ease-in-out infinite;}
.ai-dot:nth-child(2){animation-delay:.2s;}
.ai-dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}
.ai-suggestion-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.chip{font-size:11px;padding:4px 10px;border-radius:20px;border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
.chip:hover{background:var(--surface2);}

/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cat-btn{font-size:12px;padding:6px 13px;border-radius:20px;border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
.cat-btn:hover{background:var(--surface2);}
.cat-btn.active{background:var(--surface);border-color:var(--border-strong);color:var(--text);font-weight:500;}

/* Columns */
.columns{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}
@media(max-width:860px){.columns{grid-template-columns:1fr;}}
.news-col{display:flex;flex-direction:column;gap:12px;}

/* Cards */
.section-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-label{display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-red{background:#E24B4A;}.dot-amber{background:#EF9F27;}.dot-blue{background:#378ADD;}.dot-teal{background:#1D9E75;}
.sec-title{font-size:13px;font-weight:500;}
.sec-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px;}

/* Platform groups */
.platform-group{margin-bottom:14px;padding-bottom:14px;border-bottom:.5px solid var(--border);}
.platform-group:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.platform-badge{display:inline-block;font-size:10px;padding:2px 9px;border-radius:4px;border:.5px solid;font-weight:500;margin-bottom:8px;}
.pb-us{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);}
.pb-jp{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);}
.pb-tw{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);}
.pb-kr{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);}
.pb-momo{background:#FBEAF0;border-color:#F4C0D1;color:#993556;}
.pb-pchome{background:var(--gray-bg);border-color:var(--gray-bd);color:var(--gray-tx);}

/* News items */
.news-item{padding:9px 0;border-bottom:.5px solid var(--border);}
.news-item:last-child{border-bottom:none;padding-bottom:0;}
.news-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.news-title-link{font-size:13px;color:var(--text);text-decoration:none;font-weight:500;line-height:1.45;flex:1;}
.news-title-link:hover{color:#378ADD;}
.news-right{display:flex;align-items:flex-start;gap:5px;flex-shrink:0;}
.news-src{font-size:11px;color:var(--text3);white-space:nowrap;margin-top:1px;}
.bookmark-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text3);padding:0 2px;line-height:1;flex-shrink:0;}
.bookmark-btn:hover{color:var(--gold);}
.bookmark-btn.saved{color:var(--gold);}
.news-meta-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.news-date{font-size:10px;color:var(--text3);}
.freshness{font-size:10px;padding:1px 6px;border-radius:4px;border:.5px solid;}
.fresh{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);}
.aged{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);}
.src-note{font-size:10px;color:var(--text3);font-style:italic;}
.news-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:5px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:var(--radius-md);border:.5px solid;white-space:nowrap;}
.tag.act{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);}
.tag.watch{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);}
.tag.info{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);}
.tag.ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);}
.empty{font-size:12px;color:var(--text3);padding:16px 0;text-align:center;}

/* Bookmark view */
#bookmark-view{display:none;}
#bookmark-view.active{display:block;}
#news-view.hidden{display:none;}
.bm-search-wrap{margin-bottom:14px;position:relative;}
.bm-search-wrap input{width:100%;padding:8px 12px 8px 36px;border:.5px solid var(--border-strong);border-radius:var(--radius-md);background:var(--surface);color:var(--text);font-size:13px;outline:none;}
.bm-search-wrap input:focus{border-color:#378ADD;}
.bm-si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.bm-stats{font-size:12px;color:var(--text3);margin-bottom:12px;}
.bm-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:10px;}
.bm-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.bm-title-link{font-size:13px;color:var(--text);text-decoration:none;font-weight:500;line-height:1.45;flex:1;}
.bm-title-link:hover{color:#378ADD;}
.bm-remove{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text3);padding:0 2px;}
.bm-remove:hover{color:#E24B4A;}
.bm-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.bm-cat{font-size:10px;padding:1px 7px;border-radius:4px;border:.5px solid;}
.bm-cat.material{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);}
.bm-cat.competitor{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);}
.bm-cat.data{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);}
.bm-cat.brand{background:var(--teal-bg);border-color:var(--teal-bd);color:var(--teal-tx);}
.bm-src{font-size:11px;color:var(--text3);}
.bm-saved-date{font-size:10px;color:var(--text3);}
.bm-summary{font-size:12px;color:var(--text2);line-height:1.55;margin-top:5px;}

/* Side panels */
.side-col{display:flex;flex-direction:column;gap:14px;position:sticky;top:20px;}
.panel{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.panel-header{padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:var(--radius-md);border:.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
.btn-sm:hover{background:var(--surface2);}
.todo-add{padding:10px 14px;border-bottom:.5px solid var(--border);display:flex;gap:6px;}
.todo-add input{flex:1;font-size:12px;padding:6px 10px;border:.5px solid var(--border-strong);border-radius:var(--radius-md);background:var(--surface2);color:var(--text);outline:none;}
.todo-add input:focus{border-color:#378ADD;background:var(--surface);}
.todo-add input::placeholder{color:var(--text3);}
.priority-select{font-size:11px;padding:6px 8px;border-radius:var(--radius-md);border:.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;outline:none;}
.add-btn{font-size:12px;padding:6px 12px;border-radius:var(--radius-md);border:.5px solid var(--border);background:var(--text);color:var(--bg);cursor:pointer;white-space:nowrap;}
.add-btn:hover{opacity:.85;}
.todo-filters{padding:8px 14px;border-bottom:.5px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;}
.tf-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:.5px solid transparent;background:transparent;color:var(--text3);cursor:pointer;}
.tf-btn.active{background:var(--surface2);border-color:var(--border);color:var(--text);}
.todo-list{max-height:320px;overflow-y:auto;padding:6px 0;}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:.5px solid var(--border);cursor:pointer;}
.todo-item:last-child{border-bottom:none;}
.todo-item:hover{background:var(--surface2);}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text3);}
.todo-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:transparent;}
.todo-item.done .todo-check{background:#1D9E75;border-color:#1D9E75;}
.todo-check-inner{width:8px;height:8px;}
.todo-body{flex:1;min-width:0;}
.todo-text{font-size:12px;line-height:1.45;color:var(--text);word-break:break-all;}
.todo-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
.prio-badge{font-size:10px;padding:1px 6px;border-radius:4px;border:.5px solid;}
.prio-high{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);}
.prio-mid{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);}
.prio-low{background:var(--gray-bg);border-color:var(--gray-bd);color:var(--gray-tx);}
.todo-date{font-size:10px;color:var(--text3);}
.todo-del{font-size:14px;color:var(--text3);cursor:pointer;padding:0 2px;opacity:0;flex-shrink:0;}
.todo-item:hover .todo-del{opacity:1;}
.todo-del:hover{color:#E24B4A;}
.todo-stats{display:flex;gap:10px;padding:10px 14px;border-top:.5px solid var(--border);flex-wrap:wrap;}
.stat-chip{font-size:11px;color:var(--text3);}
.stat-chip span{color:var(--text);font-weight:500;}
.memo-area{width:100%;font-size:12px;line-height:1.7;padding:12px 14px;border:none;background:transparent;color:var(--text);resize:none;outline:none;font-family:inherit;min-height:100px;}
.memo-area::placeholder{color:var(--text3);}
.memo-footer{padding:8px 14px;border-top:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.memo-saved{font-size:11px;color:var(--text3);}
.memo-clear{font-size:11px;color:var(--text3);cursor:pointer;border:none;background:none;padding:0;}
.memo-clear:hover{color:#E24B4A;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);font-size:12px;padding:8px 18px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="brand">Coupang BM · 鍋具採購情報</div>
      <div class="main-title">每日採購情資看板</div>
    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()"><span class="refresh-icon">↻</span> 重新整理</button>
      <div class="date-badge" id="today-date"></div>
    </div>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" id="tab-news" onclick="switchView('news')">每日新聞</button>
    <button class="view-tab" id="tab-bookmark" onclick="switchView('bookmark')">收藏文章 <span id="bm-count-badge" style="font-size:10px;color:var(--text3);"></span></button>
  </div>

  <!-- NEWS VIEW -->
  <div id="news-view">

    <!-- ── AI SEARCH ── -->
    <div class="ai-search-box">
      <div class="ai-search-label">
        <span>AI 情資搜尋</span>
        <span class="ai-badge">Claude AI</span>
      </div>
      <div class="ai-search-row">
        <input class="ai-search-input" id="ai-query" placeholder="例：鈦鍋具市場接受度、不鏽鋼Q3鎖價時機、Le Creuset 最新動態…" onkeydown="if(event.key==='Enter')doAISearch()"/>
        <button class="ai-search-btn" id="ai-btn" onclick="doAISearch()">搜尋情資 ↗</button>
      </div>
      <div class="ai-suggestion-chips">
        <button class="chip" onclick="setQuery('鈦鍋具台灣市場接受度與消費者反應')">鈦鍋具市場</button>
        <button class="chip" onclick="setQuery('不鏽鋼鍋具Q3採購鎖價建議')">不鏽鋼鎖價</button>
        <button class="chip" onclick="setQuery('Le Creuset 台灣最新上架與促銷動態')">Le Creuset</button>
        <button class="chip" onclick="setQuery('氣炸鍋台灣市場趨勢 2026')">氣炸鍋趨勢</button>
        <button class="chip" onclick="setQuery('競業電商鍋具定價比較 momo pchome')">競業比價</button>
      </div>
      <div class="ai-result-box" id="ai-result-box">
        <div class="ai-result-header">
          <span class="ai-result-title" id="ai-result-title"></span>
          <button class="ai-result-close" onclick="closeAIResult()">✕</button>
        </div>
        <div class="ai-result-content" id="ai-result-content"></div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <button class="cat-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="cat-btn" onclick="setFilter('material',this)">原物料</button>
      <button class="cat-btn" onclick="setFilter('competitor',this)">競業電商</button>
      <button class="cat-btn" onclick="setFilter('data',this)">數據報告</button>
      <button class="cat-btn" onclick="setFilter('brand',this)">品牌 &amp; SEO</button>
    </div>

    <div class="columns">
      <div class="news-col" id="news-grid"></div>
      <div class="side-col">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">✓ 工作待辦</div>
            <button class="btn-sm" onclick="clearDone()">清除已完成</button>
          </div>
          <div class="todo-add">
            <input type="text" id="todo-input" placeholder="新增待辦事項…" onkeydown="if(event.key==='Enter')addTodo()"/>
            <select class="priority-select" id="todo-prio">
              <option value="high">🔴 高</option>
              <option value="mid" selected>🟡 中</option>
              <option value="low">⚪ 低</option>
            </select>
            <button class="add-btn" onclick="addTodo()">+ 新增</button>
          </div>
          <div class="todo-filters">
            <button class="tf-btn active" onclick="setTodoFilter('all',this)">全部</button>
            <button class="tf-btn" onclick="setTodoFilter('pending',this)">待辦</button>
            <button class="tf-btn" onclick="setTodoFilter('done',this)">已完成</button>
            <button class="tf-btn" onclick="setTodoFilter('high',this)">🔴 高優先</button>
          </div>
          <div class="todo-list" id="todo-list"></div>
          <div class="todo-stats" id="todo-stats"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">📝 個人備忘</div></div>
          <textarea class="memo-area" id="memo-area" placeholder="隨手記錄…&#10;例：下週與 XX 供應商開會討論 Q3 報價。" oninput="saveMemo()"></textarea>
          <div class="memo-footer">
            <span class="memo-saved" id="memo-saved">尚未有內容</span>
            <button class="memo-clear" onclick="clearMemo()">清除</button>
          </div>
        </div>
      </div>

/* ─── Utilities ─── */
function today(){return new Date().toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'});}
function freshTag(d){
  const diff=Math.floor((Date.now()-new Date(d))/86400000);
  if(diff<=1)return '<span class="freshness fresh">● 今日</span>';
  if(diff<=7)return `<span class="freshness fresh">● ${diff}天前</span>`;
  return `<span class="freshness aged">● ${diff}天前</span>`;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* ─── Header ─── */
document.getElementById('today-date').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
function updateLastUpdated(){document.getElementById('last-updated').textContent='更新於 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
updateLastUpdated();
function doRefresh(){const b=document.getElementById('refresh-btn');b.classList.add('spinning');b.disabled=true;setTimeout(()=>{updateLastUpdated();renderNews();showToast('內容已更新');b.classList.remove('spinning');b.disabled=false;},900);}

/* ─── View switch ─── */
function switchView(v){
  document.getElementById('tab-news').classList.toggle('active',v==='news');
  document.getElementById('tab-bookmark').classList.toggle('active',v==='bookmark');
  document.getElementById('news-view').classList.toggle('hidden',v!=='news');
  document.getElementById('bookmark-view').classList.toggle('active',v==='bookmark');
  if(v==='bookmark')renderBookmarks();
}

/* ─── AI Search (Claude API + web_search tool) ─── */
function setQuery(q){document.getElementById('ai-query').value=q;document.getElementById('ai-query').focus();}
function closeAIResult(){document.getElementById('ai-result-box').classList.remove('show');}

async function doAISearch(){
  const q=document.getElementById('ai-query').value.trim();
  if(!q)return;
  const btn=document.getElementById('ai-btn');
  const box=document.getElementById('ai-result-box');
  const content=document.getElementById('ai-result-content');
  const title=document.getElementById('ai-result-title');
  btn.disabled=true;btn.textContent='搜尋中…';
  box.classList.add('show');
  title.textContent='搜尋中：'+q;
  content.innerHTML='<div class="ai-loading"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span><span style="margin-left:4px;">正在搜尋最新採購情資…</span></div>';

  const systemPrompt=`你是酷澎台灣鍋具類採購 BM 的 AI 助理。
請根據使用者查詢，提供簡潔、有用的採購情資分析。
格式要求：
- 用繁體中文回答
- 包含：現況摘要 / 對採購的影響 / 建議行動（各1-3條）
- 如果有具體數據或來源，請標示
- 回答控制在300字以內，重點清晰
- 不要使用Markdown標題符號(#)，用【】標記段落`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`採購情資查詢：${q}\n\n請搜尋最新資訊後，提供對鍋具採購BM有用的分析與建議。`}]
      })
    });
    const data=await resp.json();
    // Extract text from content blocks
    let text='';
    if(data.content&&Array.isArray(data.content)){
      data.content.forEach(block=>{
        if(block.type==='text')text+=block.text;
      });
    }
    if(!text&&data.error){
      text='搜尋服務暫時無法使用，請稍後再試。\n\n建議直接前往 SMM、Bloomberg、Google Trends 查詢相關資訊。';
    }
    title.textContent='情資分析：'+q;
    content.textContent=text||'未取得回應，請重試。';
  }catch(e){
    title.textContent='搜尋結果';
    content.textContent='網路連線或服務異常，請稍後再試。\n\n錯誤：'+e.message;
  }
  btn.disabled=false;btn.textContent='搜尋情資 ↗';
}

let activeFilter='all';
function setFilter(cat,el){activeFilter=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderNews();}

function renderItem(it,secId){
  const saved=isBookmarked(it.title);
  const itJ=JSON.stringify(it).replace(/'/g,'&apos;');
  const srcNote=it.srcType?`<span class="src-note">[${it.srcType}]</span>`:'';
  return `<div class="news-item">
    <div class="news-top">
      <a class="news-title-link" href="${it.url}" target="_blank" rel="noopener">${it.title}</a>
      <div class="news-right">
        <span class="news-src">${it.src}</span>
        <button class="bookmark-btn ${saved?'saved':''}" onclick="toggleBookmark(${itJ},'${secId}',this)">${saved?'★':'☆'}</button>
      </div>
    </div>
    <div class="news-meta-row"><span class="news-date">${it.date}</span>${freshTag(it.date)}${srcNote}</div>
    <div class="news-summary">${it.summary.replace(/\n/g,'<br>')}</div>
    <div class="tags">${it.actions.map(a=>`<span class="tag ${a.type}">${a.label}</span>`).join('')}</div>
  </div>`;
}

  grid.innerHTML='';
  SECTIONS.forEach(sec=>{
    if(activeFilter!=='all'&&activeFilter!==sec.id)return;
    const card=document.createElement('div');
    card.className='section-card';
    if(sec.byPlatform&&sec.platforms){
      const total=sec.platforms.reduce((n,p)=>n+p.items.length,0);
      card.innerHTML=`<div class="sec-header"><div class="sec-label"><span class="dot ${sec.dot}"></span><span class="sec-title">${sec.title}</span></div><span class="sec-count">${total} 則</span></div>`
        +sec.platforms.map(p=>`<div class="platform-group"><span class="platform-badge ${p.badgeClass}">${p.label}</span>${p.items.map(it=>renderItem(it,sec.id)).join('')}</div>`).join('');
    }else{
      const items=sec.items||[];
      card.innerHTML=`<div class="sec-header"><div class="sec-label"><span class="dot ${sec.dot}"></span><span class="sec-title">${sec.title}</span></div><span class="sec-count">${items.length} 則</span></div>`
        +items.map(it=>renderItem(it,sec.id)).join('');
    }
    grid.appendChild(card);
  });
}

/* ─── Bookmarks ─── */
let bookmarks=[];
function loadBookmarks(){try{bookmarks=JSON.parse(localStorage.getItem('cp_bookmarks')||'[]');}catch(e){bookmarks=[];}updateBmBadge();}
function saveBookmarks(){localStorage.setItem('cp_bookmarks',JSON.stringify(bookmarks));updateBmBadge();}
function updateBmBadge(){const el=document.getElementById('bm-count-badge');el.textContent=bookmarks.length>0?`(${bookmarks.length})`:'';} 
function isBookmarked(t){return bookmarks.some(b=>b.title===t);}
function toggleBookmark(item,catId,btn){
  const idx=bookmarks.findIndex(b=>b.title===item.title);
  if(idx>=0){bookmarks.splice(idx,1);btn.textContent='☆';btn.classList.remove('saved');showToast('已取消收藏');}
  else{bookmarks.unshift({...item,catId,savedDate:new Date().toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})});btn.textContent='★';btn.classList.add('saved');showToast('已收藏文章 ★');}
  saveBookmarks();
}
const CAT_LABELS={material:'原物料',competitor:'競業電商',data:'數據報告',brand:'品牌 SEO'};
function renderBookmarks(){
  const q=(document.getElementById('bm-search').value||'').toLowerCase();
  const list=bookmarks.filter(b=>!q||(b.title+b.summary+b.src).toLowerCase().includes(q));
  document.getElementById('bm-stats').textContent=`共收藏 ${bookmarks.length} 篇，顯示 ${list.length} 篇`;
  const el=document.getElementById('bm-list');
  if(!list.length){el.innerHTML=`<div class="empty" style="padding:40px 0;">${!bookmarks.length?'尚無收藏文章，點擊新聞右側 ☆ 即可收藏':'無符合搜尋的收藏文章'}</div>`;return;}
  el.innerHTML=list.map((b,i)=>`<div class="bm-item">
    <div class="bm-item-top"><a class="bm-title-link" href="${b.url}" target="_blank" rel="noopener">${b.title}</a><button class="bm-remove" onclick="removeBookmark(${i})">✕</button></div>
    <div class="bm-meta"><span class="bm-cat ${b.catId}">${CAT_LABELS[b.catId]||b.catId}</span><span class="bm-src">${b.src}</span><span class="bm-saved-date">收藏於 ${b.savedDate}</span>${freshTag(b.date)}</div>
    <div class="bm-summary">${b.summary.replace(/\n/g,'<br>')}</div>
  </div>`).join('');
}
function removeBookmark(i){
  const q=(document.getElementById('bm-search').value||'').toLowerCase();
  const v=bookmarks.filter(b=>!q||(b.title+b.summary+b.src).toLowerCase().includes(q));
  bookmarks=bookmarks.filter(b=>b.title!==v[i].title);
  saveBookmarks();renderBookmarks();renderNews();showToast('已移除收藏');
}

/* ─── Todo ─── */
let todos=[],todoFilter='all',todoId=0;
const PL={high:'高優先',mid:'中優先',low:'一般'},PC={high:'prio-high',mid:'prio-mid',low:'prio-low'};
function loadTodos(){try{todos=JSON.parse(localStorage.getItem('cp_todos')||'[]');}catch(e){todos=[];}todoId=todos.reduce((m,t)=>Math.max(m,t.id),0);}
function saveTodos(){localStorage.setItem('cp_todos',JSON.stringify(todos));}
function setTodoFilter(f,el){todoFilter=f;document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTodos();}
function addTodo(){const i=document.getElementById('todo-input'),p=document.getElementById('todo-prio').value,t=i.value.trim();if(!t){i.focus();return;}todos.unshift({id:++todoId,text:t,prio:p,done:false,date:today()});saveTodos();i.value='';i.focus();renderTodos();}
function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;saveTodos();renderTodos();}}
function deleteTodo(id,e){e.stopPropagation();todos=todos.filter(x=>x.id!==id);saveTodos();renderTodos();}
function clearDone(){todos=todos.filter(x=>!x.done);saveTodos();renderTodos();showToast('已清除完成項目');}
function renderTodos(){
  let list=todos;
  if(todoFilter==='pending')list=todos.filter(x=>!x.done);
  else if(todoFilter==='done')list=todos.filter(x=>x.done);
  else if(todoFilter==='high')list=todos.filter(x=>x.prio==='high'&&!x.done);
  document.getElementById('todo-list').innerHTML=list.length===0?'<div class="empty">暫無項目</div>':list.map(t=>`
    <div class="todo-item ${t.done?'done':''}" onclick="toggleTodo(${t.id})">
      <div class="todo-check">${t.done?'<svg class="todo-check-inner" viewBox="0 0 8 8"><polyline points="1,4 3,6 7,2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
      <div class="todo-body"><div class="todo-text">${escHtml(t.text)}</div><div class="todo-meta"><span class="prio-badge ${PC[t.prio]}">${PL[t.prio]}</span><span class="todo-date">${t.date}</span></div></div>
      <span class="todo-del" onclick="deleteTodo(${t.id},event)">✕</span>
    </div>`).join('');
  const done=todos.filter(x=>x.done).length,high=todos.filter(x=>x.prio==='high'&&!x.done).length;
  document.getElementById('todo-stats').innerHTML=`<span class="stat-chip">待辦 <span>${todos.length-done}</span></span><span class="stat-chip">已完成 <span>${done}</span></span>${high>0?`<span class="stat-chip">🔴 高優先 <span>${high}</span></span>`:''}`;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ─── Memo ─── */
function loadMemo(){const s=localStorage.getItem('cp_memo')||'';document.getElementById('memo-area').value=s;updateMemoStatus(s);}
let memoTimer;
function saveMemo(){clearTimeout(memoTimer);document.getElementById('memo-saved').textContent='儲存中…';memoTimer=setTimeout(()=>{const v=document.getElementById('memo-area').value;localStorage.setItem('cp_memo',v);updateMemoStatus(v);},600);}
function updateMemoStatus(v){document.getElementById('memo-saved').textContent=v.trim().length===0?'尚未有內容':`已儲存 · ${v.trim().length} 字`;}
function clearMemo(){if(!confirm('確定要清除備忘內容嗎？'))return;document.getElementById('memo-area').value='';localStorage.removeItem('cp_memo');updateMemoStatus('');}

/* ─── Init ─── */
loadBookmarks();loadTodos();renderTodos();loadMemo();renderNews();
if(todos.length===0){
  const s=[
    {id:1,text:'立即評估 Q3 不鏽鋼採購鎖價方案（印尼鎳礦配額觸頂）',prio:'high',done:false,date:'04/29'},
    {id:2,text:'確認酷澎618鍋具促銷排程，與 momo / PChome 比較定價',prio:'high',done:false,date:'04/29'},
    {id:3,text:'追蹤嘖嘖鈦鍋眾籌結果，評估鈦鍋具電商引進可行性',prio:'mid',done:false,date:'04/29'},
    {id:4,text:'SEO 團隊優化不鏽鋼鍋品項頁關鍵字（推薦2026）',prio:'mid',done:false,date:'04/29'},
    {id:5,text:'下載 GfK Q1 廚房用品報告並整理摘要',prio:'mid',done:true,date:'04/28'},
  ];
  todos=s;todoId=5;saveTodos();renderTodos();
}
</script>
